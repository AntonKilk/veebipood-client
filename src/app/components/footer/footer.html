<footer class="mt-24 border-t hairline">
  <div class="mx-auto flex max-w-7xl flex-col gap-6 px-6 py-12 lg:flex-row lg:items-end lg:justify-between lg:px-10">
    <div class="space-y-3">
      <p class="font-display text-2xl font-light leading-none">veebipood</p>
      <p class="max-w-xs text-[13px] leading-relaxed text-[color:var(--color-ink-muted)]">
        {{ 'brand.tagline' | t }}
      </p>
    </div>
    <div class="flex flex-col gap-2 text-[12px] tracking-wide text-[color:var(--color-ink-muted)] lg:items-end">
      <a
        href="https://github.com/AntonKilk/veebipood"
        target="_blank"
        rel="noreferrer"
        class="underline-offset-4 transition hover:text-[color:var(--color-ink)] hover:underline"
      >
        {{ 'footer.repo' | t }} ↗
      </a>
      <p>{{ 'footer.copyright' | t }}</p>
    </div>
  </div>
</footer>
